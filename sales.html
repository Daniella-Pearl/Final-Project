<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NyondoStock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Miniver&family=Montagu+Slab:opsz,wght@16..144,100..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Prata&family=Sofia&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="navbar">
      <h2>
        Welcome back to The Sales Mangement Section!
        <span>24-04-2026</span>
      </h2>
    </div>
    <div class="customerInfo">
      <h2>
        <i class="fa-solid fa-user" style="color: rgb(177, 151, 252)"></i
        >Customer Details
      </h2>
      <div class="customerBox">
        <form action="">
          <div class="customerKid">
            <div class="customerkids">
              <label for="customername"> Customer Name</label>
              <input
                type="search"
                id="customername"
                placeholder="🔍Search Customer"
                required
              />
            </div>
            <div class="customerkids">
              <label for="phoneNumber">Phone Number</label>
              <input type="tel" id="phoneNumber" placeholder="0740898912" />
            </div>
          </div>
          <div class="customerkids">
            <label>
              <input type="radio" name="contact" value="Walk-In" />
              Walk-In Customer
            </label>
          </div>
        </form>
      </div>
    </div>
    <div class="customerInfo">
      <h2>
        <i class="fa-solid fa-box-open" style="color: rgb(177, 151, 252)"></i
        >Add Product
      </h2>
      <div class="customerBox">
        <form action="">
          <div class="customerKids">
            <div class="customerkids">
              <label for="productName">Product</label>
              <input
                type="search"
                id="productName"
                placeholder="🔍Search Product"
                required
              />
            </div>
            <div class="customerkids">
              <label for="quantity"> Quantity</label>
              <input type="number" id="quantity" placeholder="0" required />
            </div>
            <div class="customerkids">
              <label for="price"> Price(UGX) </label>
              <input
                type="text"
                id="price"
                placeholder="Auto"
                required
              />
            </div>
            <div class="customerkids">
              <button type="submit" class="pdtbtn" onclick="addRow()">+</button>
            </div>
          </div>
        </form>
      </div>
    </div>
    <div class="customerInfo">
      <h2>
        <i
          class="fa-solid fa-cart-shopping"
          style="color: rgb(177, 151, 252)"
        ></i
        >Cart Items 
      </h2>
      <div class="customerBox">
        <table id="dataTable">
          <thead>
            <tr>
              <th>Product</th>
              <th>Quantity</th>
              <th>Price</th>
              <th>Total</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <!-- cart items go here -->
                 <tr><td>Student 1</td><td>78</td><td>85</td><td>88</td><td>76</td></tr>
    <tr><td>Student 2</td><td>67</td><td>74</td><td>80</td><td>72</td></tr>
    <tr><td>Student 3</td><td>92</td><td>89</td><td>94</td><td>88</td></tr>
    <tr><td>Student 4</td><td>55</td><td>60</td><td>58</td><td>59</td></tr>
    <tr><td>Student 5</td><td>81</td><td>77</td><td>85</td><td>83</td></tr>
    <tr><td>Student 6</td><td>73</td><td>70</td><td>75</td><td>74</td></tr>
    <tr><td>Student 7</td><td>88</td><td>91</td><td>86</td><td>89</td></tr>
  
          </tbody>
        </table>
        <form class="customerkids2">
          <label for="total">Total In Cart</label>
          <input type="text" id="total" inputmode="numeric" pattern="[0-9]*">
        </form>
      </div>
    </div>
  
  </body>
</html>
